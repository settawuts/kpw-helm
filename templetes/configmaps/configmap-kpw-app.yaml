apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.kpwApp.name }}-config"
  namespace: "{{ .Values.kpwApp.namespace }}"
data:
  default.conf: |
    server {
      listen 80;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      # path /hello
      location /hello {
        proxy_pass {{ .Values.kpwApp.host }};
      }
    }