apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Values.kpwApp.name }}-ingress"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.kpwApp.name }}
            port:
              number: {{ .Values.kpwApp.port }}

      - path: /hello
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.s3proxy.name }}
            port:
              number: 80