apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kpw-app-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: kpw-app
            port:
              number: 80
      - path: /hello
        pathType: Prefix
        backend:
          service:
            name: s3-proxy
            port:
              number: 80
