apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kpw-app-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-kpw
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - 45.91.134.46.nip.io
      secretName: kpw-tls     

  rules:
  - host: 45.91.134.46.nip.io
    http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: kpw-app
            port:
              number: 80
              
      - path: /hello
        pathType: Prefix
        backend:
          service:
            name: s3-proxy
            port:
              number: 80
