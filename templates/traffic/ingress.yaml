apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kpw-app-ingress
  namespace: kpw-app-site
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-kpw
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - 18.143.49.229.nip.io
      secretName: kpw-tls     

  rules:
  - host: 18.143.49.229.nip.io
    http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: kpw-app
            port:
              number: 80

      - path: /hello
        pathType: Prefix
        backend:
          service:
            name: s3-proxy
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: kpw-monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-kpw
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

spec:
  ingressClassName: nginx
  tls:                                                       # <-- เพิ่ม
  - hosts:
      - 18.143.49.229.nip.io
    secretName: kpw-tls      
  rules:
    - host: 18.143.49.229.nip.io
      http:
        paths:
          - path: /grafana
            pathType: Prefix  
            backend:
              service:
                name: grafana
                port:
                  number: 3000