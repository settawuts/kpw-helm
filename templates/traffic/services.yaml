apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kpwApp.name }}
spec:
  type: ClusterIP 
  selector:
    app: {{ .Values.kpwApp.name }}
  ports:
    - port: {{ .Values.kpwApp.port }}
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: s3-hello
spec:
  type: ExternalName
  externalName: kpc-candidate-test.s3-website-ap-southeast-1.amazonaws.com