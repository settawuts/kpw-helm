apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kpwApp.name }}
spec:
  type: ClusterIP 
  selector:
    app: {{ .Values.kpwApp.name }}
  ports:
    - port: {{ .Values.kpwApp.port }}
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.s3proxy.name }}
spec:
  selector:
    app: {{ .Values.s3proxy.name }}
  ports:
  - port: 80
    targetPort: 80
    