apiVersion: v1
kind: ConfigMap
metadata:
  name: s3-proxy-config
  namespace: kpw-app-site
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        location / {
          proxy_pass http://kpc-candidate-test.s3-website-ap-southeast-1.amazonaws.com;
          proxy_set_header Host kpc-candidate-test.s3-website-ap-southeast-1.amazonaws.com;
          proxy_redirect off; 
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }

