apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: kpw-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'mongodb'
        static_configs:
          - targets: ['mongodb-exporter.kpw-monitoring.svc.cluster.local:9216']
        metrics_path: /metrics