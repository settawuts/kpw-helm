apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: kpw-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.0.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "Passw0rd#1234"   
            - name: GF_SERVER_DOMAIN
              value: "18.143.49.229.nip.io" 
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/" 
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}