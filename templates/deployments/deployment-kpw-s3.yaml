apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.s3proxy.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.s3proxy.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.s3proxy.name }}
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: s3-proxy-config
