apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: kpw-mongo
spec:
  serviceName: "mongo"
  replicas: 3

  podManagementPolicy: Parallel

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mongo
          image: mongo:3.6
          command:
            - mongod
            - "--replSet"
            - rs0
            - "--bind_ip"
            - "0.0.0.0"
          ports:
            - containerPort: 27017

          resources:
            requests:
              cpu: "100m"
              memory: "156Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mongo --eval "db.adminCommand('ping')" || exit 1
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mongo --eval "db.adminCommand('ping')" || exit 1
            initialDelaySeconds: 30
            periodSeconds: 15

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: 
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi