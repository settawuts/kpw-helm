apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kpw-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/settawuts/kpw-helm
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: kpw-app-site

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true